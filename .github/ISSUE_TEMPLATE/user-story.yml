name: User Story
description: File a new formal product requirement user story.
labels: ["user-story", "pbi"]
body:
  - type: input
    id: story-id
    attributes:
      label: Stable User Story ID
      placeholder: "e.g., US-01"
    validations:
      required: true
  - type: textarea
    id: statement
    attributes:
      label: User Story Statement
      description: As a [role], I want [action], so that [value].
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Description, Context, and Assumptions
      description: Notes, constraints, or open questions.
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, observable, and testable criteria (Given/When/Then recommended).
    validations:
      required: true
  - type: input
    id: implementer
    attributes:
      label: Implementer
      placeholder: "@username"
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      placeholder: "@different_username"