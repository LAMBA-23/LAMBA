name: Other PBI
description: Technical work, infrastructure, design, or documentation that improves the product.
labels: ["pbi"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Clear, testable outcomes required to mark this done.
    validations:
      required: true
  - type: input
    id: implementer
    attributes:
      label: Implementer
      placeholder: "@username"
    validations:
      required: true
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      placeholder: "@different_username"
    validations:
      required: true