services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lamba
      POSTGRES_USER: lamba
      POSTGRES_PASSWORD: lamba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lamba -d lamba"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://lamba:lamba@db:5432/lamba
      TIMEWEB_API_KEY: ${TIMEWEB_API_KEY:-}
      TIMEWEB_AGENT_ID: ${TIMEWEB_AGENT_ID:-fc0c89ec-4868-408c-99cd-dc6d5ea764c8}
      TIMEWEB_MODEL: ${TIMEWEB_MODEL:-deepseek-chat}
      TIMEWEB_TIMEOUT_SECONDS: ${TIMEWEB_TIMEOUT_SECONDS:-20}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      PHOTO_STORAGE_BACKEND: ${PHOTO_STORAGE_BACKEND:-local}
      EVENT_PHOTO_DIR: ${EVENT_PHOTO_DIR:-/app/uploads/event_photos}
      PHOTO_S3_BUCKET: ${PHOTO_S3_BUCKET:-}
      PHOTO_S3_ENDPOINT: ${PHOTO_S3_ENDPOINT:-}
      PHOTO_S3_REGION: ${PHOTO_S3_REGION:-}
      PHOTO_S3_PREFIX: ${PHOTO_S3_PREFIX:-event-photos}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
