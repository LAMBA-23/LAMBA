services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lamba
      POSTGRES_USER: lamba
      POSTGRES_PASSWORD: lamba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lamba -d lamba"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://lamba:lamba@db:5432/lamba
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
