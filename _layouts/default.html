<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #1d2433;
        --muted: #5f6b7a;
        --line: #d9dee8;
        --accent: #b8172f;
        --accent-soft: #f7e7ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 28px 22px;
      }

      .brand {
        margin: 0 0 4px;
        font-size: 1.25rem;
        line-height: 1.2;
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      nav a {
        display: block;
        margin: 4px 0;
        padding: 8px 10px;
        border-radius: 6px;
        color: var(--text);
        text-decoration: none;
      }

      nav a:hover,
      nav a:focus {
        background: var(--accent-soft);
        color: var(--accent);
      }

      main {
        max-width: 980px;
        width: 100%;
        padding: 42px 48px 72px;
      }

      article {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 34px 40px;
      }

      h1,
      h2,
      h3 {
        line-height: 1.25;
      }

      h1 {
        margin-top: 0;
      }

      a {
        color: var(--accent);
      }

      code {
        background: #f0f2f7;
        border-radius: 4px;
        padding: 0.1em 0.3em;
      }

      pre {
        overflow-x: auto;
        background: #f0f2f7;
        border-radius: 8px;
        padding: 16px;
      }

      table {
        display: block;
        width: 100%;
        overflow-x: auto;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        vertical-align: top;
      }

      th {
        background: #f0f2f7;
      }

      @media (max-width: 820px) {
        .layout {
          display: block;
        }

        aside {
          position: static;
          height: auto;
        }

        main {
          padding: 20px 14px 40px;
        }

        article {
          padding: 24px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <h1 class="brand">LAMBA Docs</h1>
        <p class="subtitle">Maintained documentation site</p>
        <nav aria-label="Documentation navigation">
          <a href="{{ '/' | relative_url }}">Overview</a>
          <a href="{{ '/docs/development-process.html' | relative_url }}">Development Process</a>
          <a href="{{ '/docs/api-contract.html' | relative_url }}">API Contract</a>
          <a href="{{ '/docs/architecture/' | relative_url }}">Architecture</a>
          <a href="{{ '/docs/quality-requirements.html' | relative_url }}">Quality Requirements</a>
          <a href="{{ '/docs/quality-requirement-tests.html' | relative_url }}">Quality Requirement Tests</a>
          <a href="{{ '/docs/testing.html' | relative_url }}">Testing</a>
          <a href="{{ '/docs/definition-of-done.html' | relative_url }}">Definition of Done</a>
          <a href="{{ '/docs/roadmap.html' | relative_url }}">Roadmap</a>
          <a href="{{ '/reports/week5/' | relative_url }}">Week 5 Report</a>
        </nav>
      </aside>
      <main>
        <article>
          {{ content }}
        </article>
      </main>
    </div>
  </body>
</html>
